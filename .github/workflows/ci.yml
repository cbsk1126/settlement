name: Settlement CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. CI 단계: 파이썬 코드 Lint 및 단위 테스트
  test:
    name: Run Lint and Pytest
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 실제 운영 의존성과 테스트/개발용 의존성을 모두 설치합니다.
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install ruff pytest

    - name: Run Linting (Ruff)
      run: |
        # src/settlement 디렉토리와 tests 디렉토리를 검사합니다.
        # flake8 src/settlement tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # flake8 src/settlement tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        ruff check src/settlement tests --output-format=github
        ruff check src/settlement tests --output-format=github

    - name: Run Unit Tests (Pytest)
      run: |
        # tests 디렉토리 내부의 테스트 코드를 실행합니다.
        pytest tests/ -v

  # 2. CD 단계: 도커 이미지 빌드 및 푸시
  # test 작업이 성공적으로 끝난 후, main 브랜치에 push 된 경우에만 실행됩니다.
  docker-build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # GitHub Secrets에 등록한 Docker Hub 계정 정보로 로그인합니다.
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 저장소 최상단에 있는 Dockerfile을 사용하여 이미지를 빌드하고 푸시합니다.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # cbsk1126/settlement 위치에 태그를 지정하여 푸시 (필요시 레지스트리 주소 변경)
        tags: cbsk1126/settlement:latest

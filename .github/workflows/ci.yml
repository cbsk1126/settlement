name: Settlement CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Lint and Pytest
    # 🌟 이곳을 자체 서버 환경으로 변경합니다!
    runs-on: self-hosted 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Linting (Ruff)
      run: |
        ruff check src/settlement tests --output-format=github

    - name: Run Unit Tests (Pytest)
      run: |
        pytest tests/ -v


# 2. 보안 스캔 단계: 도커 빌드 및 Trivy 점검
  build-and-scan:
    name: Docker Build & Trivy Scan
    needs: test # 앞의 test 작업이 성공적으로 끝났을 때만 실행됩니다.
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # (1) 도커 이미지 빌드
    - name: Build Docker image
      run: |
        # docker build -t cbsk1126/settlement:latest .
        docker build -t settlement:latest .

    # (2) Trivy 취약점 스캔 (요청하신 조건 적용)
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        # image-ref: 'cbsk1126/settlement:latest'
        image-ref: 'settlement'
        format: 'table'
        exit-code: '1'           # 취약점이 발견되면 파이프라인을 실패(빨간불)로 처리합니다.
        ignore-unfixed: true     # 아직 패치가 나오지 않은 취약점은 무시합니다.
        severity: 'CRITICAL'     # CRITICAL 등급의 취약점만 찾아냅니다.

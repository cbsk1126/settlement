name: Settlement CD Pipeline

# 앞서 만든 CI 워크플로우가 완료되었을 때 실행되도록 트리거를 설정합니다.
on:
  workflow_run:
    workflows: ["Settlement CI/CD Pipeline"] # ⚠️ 주의: ci.yml 파일 맨 위에 적힌 'name'과 정확히 똑같아야 합니다.
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Kind Cluster (settlement-local)
    runs-on: self-hosted
    # CI 파이프라인이 단순히 끝난 게 아니라 '성공(success)'했을 때만 배포를 시작합니다.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. 빌드된 도커 이미지를 kind 클러스터 내부로 적재합니다. (가장 중요)
    - name: Load Docker Image into Kind Cluster
      run: |
        echo "📦 settlement:latest 이미지를 settlement-local 클러스터로 로드합니다..."
        kind load docker-image settlement:latest --name settlement-local

    # 2. Kubernetes 매니페스트 파일을 적용합니다.
    - name: Apply Kubernetes Manifests
      run: |
        echo "🚀 k8s 폴더의 설정 파일로 배포를 진행합니다..."
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    # 3. 최신 이미지가 파드에 즉시 반영되도록 재시작합니다.
    - name: Restart Deployment for Pulling New Image
      run: |
        echo "🔄 최신 이미지를 반영하기 위해 파드를 재시작합니다..."
        # ⚠️ deployment 이름이 'settlement-deployment'가 아니라면, 실제 파일에 적힌 metadata.name으로 수정해 주세요.
        kubectl rollout restart deployment settlement-deployment
        
    # 4. 배포가 정상적으로 완료되었는지 상태를 확인합니다.
    - name: Verify Deployment Status
      run: |
        echo "✅ 배포 상태를 최종 점검합니다."
        kubectl rollout status deployment settlement-deployment
